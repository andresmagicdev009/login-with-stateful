<div class="login-container">
  <div class="login-card">
    <h2>Iniciar Sesión</h2>
    <p class="subtitle">Accede a tu cuenta con estado seguro</p>

    <!-- Alerta de Error General (Controlado por código de estado) -->
    <div *ngIf="errorMessage" class="alert error-alert animate-fade-in">
      {{ errorMessage }}
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      
      <!-- Campo: Email -->
      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input 
          type="email" 
          id="email" 
          formControlName="email"
          placeholder="ejemplo@correo.com"
          [class.input-error]="emailInvalid"
        />
        <div *ngIf="emailInvalid" class="error-text">
          <small *ngIf="loginForm.get('email')?.errors?.['required']">El correo es obligatorio.</small>
          <small *ngIf="loginForm.get('email')?.errors?.['email']">El formato de correo no es válido.</small>
        </div>
      </div>

      <!-- Campo: Contraseña -->
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input 
          type="password" 
          id="password" 
          formControlName="password"
          placeholder="••••••••"
          [class.input-error]="passwordInvalid"
        />
        <div *ngIf="passwordInvalid" class="error-text">
          <small *ngIf="loginForm.get('password')?.errors?.['required']">La contraseña es obligatoria.</small>
          <small *ngIf="loginForm.get('password')?.errors?.['minlength']">La contraseña debe tener al menos 8 caracteres.</small>
        </div>
      </div>

      <!-- Botón de Envío -->
      <button 
        type="submit" 
        [disabled]="loginForm.invalid || isLoading"
        class="btn-submit"
      >
        <span *ngIf="!isLoading">Ingresar</span>
        <span *ngIf="isLoading" class="spinner">Cargando...</span>
      </button>
    </form>

    <div class="footer-links">
      <p>¿No tienes una cuenta? <a routerLink="/register">Regístrate aquí</a></p>
    </div>
  </div>
</div>
